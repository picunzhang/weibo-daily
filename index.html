<!DOCTYPE html>

        /* 7.3寸墨水屏优化 - 800x480 (5:3) */
        @font-face {
            font-family: 'Noto Sans CJK SC';
            src: local('Noto Sans CJK SC'), local('Microsoft YaHei'), local('SimHei'), local('WenQuanYi Micro Hei');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            height: 480px;
            font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', 'SimHei', 'WenQuanYi Micro Hei', sans-serif;
            background: #fff;
            color: #000;
            padding: 20px 28px;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .header-left .date {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-left .weekday {
            font-size: 16px;
            opacity: 0.7;
        }

        .header-right .time {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            padding: 6px 0;
            border-bottom: 1px solid #ccc;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }

        .hot-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hot-item {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            font-size: 15px;
            line-height: 1.4;
            border-bottom: 1px dashed #ddd;
        }

        .hot-item:last-child {
            border-bottom: none;
        }

        .hot-item .rank {
            width: 28px;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .hot-item .rank.top3 {
            color: #000;
            font-weight: 900;
        }

        .hot-item .title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hot-item .hot {
            width: 60px;
            text-align: right;
            font-size: 12px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .footer {
            position: absolute;
            bottom: 12px;
            right: 28px;
            font-size: 11px;
            opacity: 0.5;
        }

        /* 墨水屏优化：无动画、无阴影、纯黑白 */
    </style>
</head>
