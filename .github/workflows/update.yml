name: Update Daily Briefing

on:
  schedule:
    # 北京时间 12:00 和 00:10 (UTC 04:00 和 16:10)
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '10 16 * * *'  # 北京时间 00:10
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Fetch Weibo hot search data
        run: |
          cd scripts
          python fetch_weibo.py
      
      - name: Generate HTML page
        run: |
          cd scripts
          python generate_html.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Auto update: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push
